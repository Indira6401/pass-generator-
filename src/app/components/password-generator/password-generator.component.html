<div class="password-generator-container">
  <!-- Header -->
  <div class="header">
    <mat-icon class="header-icon">lock</mat-icon>
    <h1>Password Generator</h1>
    <p class="subtitle">Generate strong, secure passwords instantly</p>
  </div>

  <!-- Password Display -->
  <div class="password-display" [class.has-password]="password">
    <mat-form-field appearance="outline" class="password-field">
      <mat-label>Your Secure Password</mat-label>
      <input
        matInput
        [value]="password"
        readonly
        placeholder="Click Generate to create a password"
        class="password-input"
      />
      <div matSuffix class="input-actions">
        <button
          mat-icon-button
          matTooltip="Regenerate"
          (click)="generatePassword()"
          *ngIf="password"
          class="action-btn regenerate-btn"
        >
          <mat-icon>refresh</mat-icon>
        </button>
        <button
          mat-icon-button
          matTooltip="Copy to clipboard"
          (click)="copyPassword()"
          *ngIf="password"
          class="action-btn copy-btn"
        >
          <mat-icon>{{ copied ? 'check' : 'content_copy' }}</mat-icon>
        </button>
      </div>
    </mat-form-field>
  </div>

  <!-- Strength Indicator -->
  <div class="strength-indicator" *ngIf="password">
    <div class="strength-bar-track">
      <div class="strength-bar-fill"></div>
    </div>
    <div class="strength-label">
      <mat-icon class="strength-icon">verified_user</mat-icon>
      <span>Strong</span>
    </div>
  </div>

  <!-- Generate Button -->
  <button
    mat-raised-button
    color="primary"
    class="generate-btn"
    (click)="generatePassword()"
  >
    <mat-icon>vpn_key</mat-icon>
    Generate Password
  </button>

  <!-- Copied Toast (inline fallback) -->
  <div class="copied-toast" *ngIf="copied">
    <mat-icon>check_circle</mat-icon>
    Password copied!
  </div>
</div>
